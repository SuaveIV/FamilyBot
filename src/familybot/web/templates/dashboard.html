<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — FamilyBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
<div class="mobile-topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    <span style="font-weight:700;font-size:16px;font-family:var(--font-ui)">FamilyBot</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="page-header">
            <div>
                <div class="page-title">Dashboard</div>
                <div class="page-subtitle">// system overview</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="refreshAll()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="page-body">

            <!-- Bot Status Metrics -->
            <div class="metrics-row mb-4" id="metrics-row">
                <div class="metric-item">
                    <div class="metric-icon blue"><i class="fas fa-robot"></i></div>
                    <div>
                        <div class="metric-value" id="bot-online-status">—</div>
                        <div class="metric-label">Bot Status</div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-icon green"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="metric-value" id="bot-uptime">—</div>
                        <div class="metric-label">Uptime</div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-icon blue"><i class="fab fa-discord"></i></div>
                    <div>
                        <div class="metric-value" id="discord-status">—</div>
                        <div class="metric-label">Discord</div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-icon yellow"><i class="fas fa-key"></i></div>
                    <div>
                        <div class="metric-value" id="token-status">—</div>
                        <div class="metric-label">Steam Token</div>
                    </div>
                </div>
                <div class="metric-item">
                    <div class="metric-icon blue"><i class="fas fa-network-wired"></i></div>
                    <div>
                        <div class="metric-value" id="websocket-status">—</div>
                        <div class="metric-label">WebSocket</div>
                    </div>
                </div>
            </div>

            <!-- Cache Stats -->
            <div class="card mb-4">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-database"></i> Cache Statistics</div>
                    <div class="btn-group">
                        <button class="btn btn-warning btn-sm" onclick="purgeCache('expired')">
                            <i class="fas fa-broom"></i> Clean Expired
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="purgeCache('all')">
                            <i class="fas fa-trash"></i> Purge All
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="stats-grid" id="cache-stats-grid">
                        <div class="stat-card">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Two-column: recent games + family members -->
            <div class="grid-2">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-clock"></i> Recent Games</div>
                        <a href="https://store.steampowered.com" target="_blank" class="btn btn-secondary btn-sm">
                            <i class="fab fa-steam"></i>
                        </a>
                    </div>
                    <div class="card-body" id="recent-games">
                        <div class="empty-state">
                            <div class="spinner spinner-lg" style="margin:0 auto 12px"></div>
                            <p>Loading games…</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-users"></i> Family Members</div>
                        <a href="/config" class="btn btn-secondary btn-sm">
                            <i class="fas fa-cog"></i>
                        </a>
                    </div>
                    <div class="card-body" id="family-members">
                        <div class="empty-state">
                            <div class="spinner spinner-lg" style="margin:0 auto 12px"></div>
                            <p>Loading members…</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/app.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadCacheStats();
    loadRecentGames();
    loadFamilyMembers();
});

function refreshAll() {
    loadBotStatus();
    loadCacheStats();
    loadRecentGames();
    loadFamilyMembers();
    showToast('Refreshed', 'info');
}
</script>
</body>
</html>
