<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common Games — FamilyBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
<div class="mobile-topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn" title="Toggle menu"><i class="fas fa-bars"></i></button>
    <span class="font-bold text-base">FamilyBot</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="page-header">
            <div>
                <div class="page-title">Common Games</div>
                <div class="page-subtitle">// games everyone owns</div>
            </div>
            <span class="badge badge-blue" id="total-badge">— games</span>
        </div>

        <div class="page-body">

            <!-- Filters + controls -->
            <div class="card mb-3">
                <div class="card-body cg-filters-body">
                    <div class="cg-filters-row">
                        <div>
                            <label class="form-label mb-2">Min Owners</label>
                            <div class="filter-btn-group" id="owner-filters">
                                <button class="filter-btn active" data-min="1">All</button>
                                <button class="filter-btn" data-min="2">2+</button>
                                <button class="filter-btn" data-min="3">3+</button>
                                <button class="filter-btn" data-min="4">4+</button>
                                <button class="filter-btn" data-min="5">5+</button>
                            </div>
                        </div>
                        <div>
                            <label class="form-label mb-2">Sort</label>
                            <div class="cg-sort-row">
                                <button class="filter-btn active" data-sort="name">A – Z</button>
                                <button class="filter-btn" data-sort="owners">Most Owners</button>
                            </div>
                        </div>
                        <div class="ml-auto">
                            <label class="form-label mb-2">View</label>
                            <div class="view-toggle">
                                <button id="btn-grid" class="active" onclick="setView('grid')" title="Grid view">
                                    <i class="fas fa-th-large"></i>
                                </button>
                                <button id="btn-list" onclick="setView('list')" title="List view">
                                    <i class="fas fa-list"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game cards -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-users"></i> Games</div>
                    <div class="cg-header-right">
                        <div id="fetch-bar" class="fetch-bar">
                            <div class="spinner"></div>
                            <span id="fetch-msg">Fetching game info…</span>
                        </div>
                        <span id="page-info" class="text-dim text-mono text-xs"></span>
                    </div>
                </div>
                <div id="games-outer" class="p-4">
                    <div id="games-container" class="games-grid">
                        <div class="empty-state grid-col-full">
                            <div class="spinner spinner-lg mx-auto mb-2"></div>
                            <p>Loading common games…</p>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <ul class="pagination" id="games-pagination"></ul>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/app.js') }}"></script>
<script>
/* ── Config ───────────────────────────────────────────────────────────── */
const PER_PAGE = 24;

/* ── State ────────────────────────────────────────────────────────────── */
let currentPage = 1;
let currentSort = 'name';
let currentView = 'grid';
let currentMinOwners = 1;
let membersMap  = {};
let nameCache   = {};
let gamesRequestId = 0;

/* ── Boot ─────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
    await initMembers();
    loadGames(1);

    document.querySelectorAll('[data-sort]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSort = btn.dataset.sort;
            loadGames(1);
        });
    });

    document.querySelectorAll('[data-min]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-min]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMinOwners = parseInt(btn.dataset.min);
            loadGames(1);
        });
    });
});

/* ── Members ──────────────────────────────────────────────────────────── */
async function initMembers() {
    try {
        const members = await fetch('/api/family-members').then(r => r.json());
        membersMap = Object.fromEntries(members.map(m => [m.steam_id, m.friendly_name]));
    } catch (err) {
        console.error("initMembers failed:", err);
    }
}

/* ── View toggle ──────────────────────────────────────────────────────── */
function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    document.getElementById('games-outer').classList.toggle('list-mode', v === 'list');
}

/* ── Load games ───────────────────────────────────────────────────────── */
async function loadGames(page) {
    currentPage = page;
    const requestId = ++gamesRequestId;
    const url = `/api/common-games?page=${page}&limit=${PER_PAGE}&min_owners=${currentMinOwners}&sort=${currentSort}`;

    const container = document.getElementById('games-container');
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="spinner spinner-lg" style="margin:0 auto 12px"></div><p>Loading…</p></div>`;

    try {
        const { items, total_items } = await fetch(url).then(r => r.json());

        // Ignore response if a newer request has been made
        if (requestId !== gamesRequestId) return;

        document.getElementById('total-badge').textContent = `${total_items} games`;
        document.getElementById('page-info').textContent =
            `Page ${page} / ${Math.ceil(total_items / PER_PAGE) || 1}`;

        if (!items.length) {
            container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                <i class="fas fa-users"></i><h3>No common games found</h3>
                <p>Games need to be cached via <code>!common_games</code> in Discord or wait for automatic sync.</p></div>`;
            document.getElementById('games-pagination').innerHTML = '';
            return;
        }

        // Sort client-side (already sorted by server, but allow client override)
        const sorted = items.sort((a, b) => {
            if (currentSort === 'owners') {
                return (b.owner_count ?? 0) - (a.owner_count ?? 0);
            }
            return (a.game_name || '\uffff').localeCompare(b.game_name || '\uffff');
        });

        container.innerHTML = sorted.map(i => buildCard(i)).join('');
        renderPagination(total_items, page);

        // Kick off background name/image resolution for any uncached items
        const missing = sorted.filter(i => !i.game_name && !nameCache[i.appid]).map(i => i.appid);
        if (missing.length) resolveMissing(missing, requestId);

    } catch (e) {
        // Only show error if this is still the latest request
        if (requestId === gamesRequestId) {
            container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                <i class="fas fa-exclamation-circle text-red"></i><h3>Load failed</h3></div>`;
        }
    }
}

/* ── Build card HTML ──────────────────────────────────────────────────── */
function buildCard(item) {
    const { appid, game_name, owner_count, owner_steam_ids = [], price_data, is_multiplayer, is_coop } = item;
    const cached = nameCache[appid];
    const name   = game_name || cached?.name || null;
    const img    = cached?.header_image
        ?? `https://cdn.akamai.steamstatic.com/steam/apps/${appid}/header.jpg`;

    // Price markup
    let pricePart = '';
    let ribbon    = '';
    if (price_data) {
        const { is_free, discount_percent: disc, final_formatted: final, initial_formatted: orig } = price_data;
        if (is_free) {
            pricePart = `<span class="cg-free">FREE</span>`;
        } else if (disc > 0) {
            pricePart = `<span class="cg-price sale"><span class="strikethrough">${orig || ''}</span>${final}</span>`;
            ribbon    = `<div class="cg-sale-ribbon">-${disc}%</div>`;
        } else {
            pricePart = `<span class="cg-price normal">${final || ''}</span>`;
        }
    }

    // Owner count ribbon (show if no sale ribbon)
    const ownerRibbon = !ribbon && owner_count > 2
        ? `<div class="cg-owner-ribbon">${owner_count} owners</div>` : '';

    // Tags for multiplayer/coop
    let tagsHtml = '';
    if (is_multiplayer || is_coop) {
        tagsHtml = `<div class="cg-tags">`;
        if (is_multiplayer) tagsHtml += `<span class="cg-tag cg-tag-multiplayer">Multiplayer</span>`;
        if (is_coop) tagsHtml += `<span class="cg-tag cg-tag-coop">Co-op</span>`;
        tagsHtml += `</div>`;
    }

    // Show owner names as individual badge tags
    const ownerNames = owner_steam_ids.map(id => membersMap[id]).filter(Boolean);
    const memberPart = ownerNames.length
        ? `<div class="cg-tags">${ownerNames.map(n => `<span class="cg-member-tag">${h(n)}</span>`).join('')}</div>` : '';

    const namePart = name
        ? `<div class="cg-name">${h(name)}</div>`
        : `<div class="cg-name-skeleton" data-sk="${appid}"></div>`;

    return `
        <a class="cg-card" href="https://store.steampowered.com/app/${appid}"
           target="_blank" rel="noopener" data-appid="${appid}">
            <div class="cg-cover-wrap">
                <div class="cg-cover-placeholder" id="ph-${appid}"></div>
                <img id="img-${appid}" class="cg-cover loading"
                     src="${h(img)}" alt="" loading="lazy"
                     onload="imgLoad('${appid}')"
                     onerror="imgError('${appid}')">
                ${ribbon}${ownerRibbon}
            </div>
            <div class="cg-info">
                ${namePart}
                <div class="cg-meta">${pricePart}${tagsHtml}${memberPart}</div>
            </div>
        </a>`;
}

function imgLoad(id) {
    document.getElementById(`img-${id}`)?.classList.remove('loading');
    const ph = document.getElementById(`ph-${id}`);
    if (ph) ph.style.display = 'none';
}

function imgError(id) {
    const img = document.getElementById(`img-${id}`);
    const ph  = document.getElementById(`ph-${id}`);
    if (img) img.style.display = 'none';
    if (ph) {
        Object.assign(ph.style, { animation: 'none', background: 'var(--bg-card-alt)' });
        ph.innerHTML = `<div style="position:absolute;inset:0;display:flex;
            align-items:center;justify-content:center;color:var(--border);font-size:24px">
            <i class="fab fa-steam"></i></div>`;
    }
}

/* ── Batch resolve missing names/images ───────────────────────────────── */
async function resolveMissing(appids, requestId) {
    const bar = document.getElementById('fetch-bar');
    const msg = document.getElementById('fetch-msg');
    bar.style.display = 'flex';

    // Process in chunks of 50 (backend cap)
    for (let i = 0; i < appids.length; i += 50) {
        const chunk = appids.slice(i, i + 50);
        msg.textContent = `Fetching info for ${chunk.length} games…`;
        try {
            const result = await fetch('/api/game-info/batch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ appids: chunk }),
            }).then(r => r.json());

            // Ignore response if a newer request has been made
            if (requestId !== gamesRequestId) {
                bar.style.display = 'none';
                return;
            }

            Object.entries(result).forEach(([appid, data]) => {
                nameCache[appid] = data;

                // Patch skeleton name in-place
                const sk = document.querySelector(`[data-sk="${appid}"]`);
                if (sk && data.name) {
                    sk.className   = 'cg-name';
                    sk.textContent = data.name;
                    delete sk.dataset.sk;
                }

                // Patch image if still loading (e.g. placeholder showing)
                const img = document.getElementById(`img-${appid}`);
                if (img && img.classList.contains('loading') && data.header_image) {
                    img.src = data.header_image;
                }
            });
        } catch (e) {
            console.warn('Batch game info failed:', e);
        }
    }

    bar.style.display = 'none';
}

/* ── Pagination ───────────────────────────────────────────────────────── */
function renderPagination(total, current) {
    const pages = Math.ceil(total / PER_PAGE);
    const ul    = document.getElementById('games-pagination');
    if (pages <= 1) { ul.innerHTML = ''; return; }

    const mk = (label, p, disabled, active) => {
        const li = Object.assign(document.createElement('li'), {
            className: 'page-item' + (disabled ? ' disabled' : '') + (active ? ' active' : ''),
            innerHTML: `<a class="page-link" href="#">${label}</a>`,
        });
        if (!disabled && !active)
            li.querySelector('a').addEventListener('click', e => { e.preventDefault(); loadGames(p); });
        return li;
    };

    ul.innerHTML = '';
    ul.appendChild(mk('«', 1, current === 1));
    ul.appendChild(mk('‹', current - 1, current === 1));

    let s = Math.max(1, current - 2);
    let e = Math.min(pages, s + 4);
    if (e - s < 4) s = Math.max(1, e - 4);
    for (let i = s; i <= e; i++) ul.appendChild(mk(i, i, false, i === current));

    ul.appendChild(mk('›', current + 1, current === pages));
    ul.appendChild(mk('»', pages, current === pages));
}

/* ── Util ─────────────────────────────────────────────────────────────── */
function h(s) {
    const el = document.createElement('span');
    el.textContent = String(s ?? '');
    return el.innerHTML;
}
</script>
</body>
</html>
