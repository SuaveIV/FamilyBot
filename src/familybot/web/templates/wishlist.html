<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — FamilyBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
<div class="mobile-topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    <span style="font-weight:700;font-size:16px;font-family:var(--font-ui)">FamilyBot</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="page-header">
            <div>
                <div class="page-title">Wishlist</div>
                <div class="page-subtitle">// family wants &amp; deals</div>
            </div>
            <span class="badge badge-blue" id="total-badge">— items</span>
        </div>

        <div class="page-body">

            <!-- Filter Row -->
            <div class="card mb-3">
                <div class="card-body" style="padding:14px 20px">
                    <label class="form-label mb-2">Filter by Member</label>
                    <div class="filter-btn-group" id="member-filters">
                        <button class="filter-btn active" data-steam-id="">All Members</button>
                    </div>
                </div>
            </div>

            <!-- Wishlist Items -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-heart"></i> Items</div>
                    <span id="page-info" class="text-dim text-mono text-xs"></span>
                </div>
                <div class="card-body" id="wishlist-container">
                    <div class="empty-state">
                        <div class="spinner spinner-lg" style="margin:0 auto 12px"></div>
                        <p>Loading wishlist…</p>
                    </div>
                </div>
                <div class="card-footer">
                    <ul class="pagination" id="wishlist-pagination"></ul>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/app.js') }}"></script>
<script>
const PER_PAGE = 20;
let currentPage = 1;
let membersMap = {};

document.addEventListener('DOMContentLoaded', async () => {
    await initMembers();
    loadWishlist(1);
});

async function initMembers() {
    try {
        const r = await fetch('/api/family-members');
        const members = await r.json();
        membersMap = Object.fromEntries(members.map(m => [m.steam_id, m.friendly_name]));

        const container = document.getElementById('member-filters');
        members.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.steamId = m.steam_id;
            btn.textContent = m.friendly_name;
            btn.addEventListener('click', () => selectMember(btn));
            container.appendChild(btn);
        });

        container.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => selectMember(btn));
        });
    } catch (e) { /* silently fail */ }
}

function selectMember(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadWishlist(1);
}

function getSelectedMember() {
    const active = document.querySelector('.filter-btn.active');
    return active ? active.dataset.steamId : '';
}

async function loadWishlist(page) {
    currentPage = page;
    const memberId = getSelectedMember();
    let url = `/api/wishlist?page=${page}&limit=${PER_PAGE}`;
    if (memberId) url += `&family_member_id=${memberId}`;

    const container = document.getElementById('wishlist-container');
    container.innerHTML = '<div class="empty-state"><div class="spinner spinner-lg" style="margin:0 auto 12px"></div><p>Loading…</p></div>';

    try {
        const r = await fetch(url);
        const data = await r.json();
        const { items, total_items } = data;

        document.getElementById('total-badge').textContent = `${total_items} items`;
        document.getElementById('page-info').textContent =
            `Page ${page} of ${Math.ceil(total_items / PER_PAGE) || 1}`;

        if (!items.length) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><h3>No wishlist items</h3><p>Run the bot\'s wishlist commands to populate data.</p></div>';
            document.getElementById('wishlist-pagination').innerHTML = '';
            return;
        }

        container.innerHTML = items.map(item => {
            const name = memberId ? '' : `<span class="badge badge-gray">${membersMap[item.steam_id] || 'Unknown'}</span>`;
            let price = '';
            if (item.price_data) {
                const p = item.price_data;
                const disc = p.discount_percent;
                price = disc > 0
                    ? `<span class="badge badge-green"><i class="fas fa-tag"></i> ${p.final_formatted} (${disc}% off)</span>`
                    : `<span class="badge badge-gray">${p.final_formatted}</span>`;
            }
            return `<div class="game-card">
                <div style="flex:1">
                    <div class="game-name">
                        <a href="https://store.steampowered.com/app/${item.appid}" target="_blank">${item.game_name || 'Unknown Game'}</a>
                    </div>
                    <div class="game-meta">App ID: ${item.appid}</div>
                    <div class="game-badges mt-1">${name} ${price}</div>
                </div>
                <a href="https://store.steampowered.com/app/${item.appid}" target="_blank" class="btn btn-secondary btn-sm">
                    <i class="fas fa-external-link-alt"></i>
                </a>
            </div>`;
        }).join('');

        renderPagination(total_items, page);

    } catch (e) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle text-red"></i><h3>Failed to load</h3></div>';
    }
}

function renderPagination(total, current) {
    const pages = Math.ceil(total / PER_PAGE);
    const ul = document.getElementById('wishlist-pagination');
    if (pages <= 1) { ul.innerHTML = ''; return; }

    const mkItem = (label, page, disabled = false, active = false) => {
        const li = document.createElement('li');
        li.className = 'page-item' + (disabled ? ' disabled' : '') + (active ? ' active' : '');
        li.innerHTML = `<a class="page-link" href="#">${label}</a>`;
        if (!disabled && !active) li.querySelector('a').addEventListener('click', e => { e.preventDefault(); loadWishlist(page); });
        return li;
    };

    ul.innerHTML = '';
    ul.appendChild(mkItem('«', 1, current === 1));
    ul.appendChild(mkItem('‹', current - 1, current === 1));

    let start = Math.max(1, current - 2);
    let end = Math.min(pages, start + 4);
    if (end - start < 4) start = Math.max(1, end - 4);

    for (let i = start; i <= end; i++) ul.appendChild(mkItem(i, i, false, i === current));

    ul.appendChild(mkItem('›', current + 1, current === pages));
    ul.appendChild(mkItem('»', pages, current === pages));
}
</script>
</body>
</html>
