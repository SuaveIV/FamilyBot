<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — FamilyBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
<div class="mobile-topbar">
    <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    <span style="font-weight:700;font-size:16px;font-family:var(--font-ui)">FamilyBot</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="page-header">
            <div>
                <div class="page-title">Logs</div>
                <div class="page-subtitle">// real-time event stream</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary btn-sm" onclick="loadLogs()">
                    <i class="fas fa-sync-alt"></i> Reload
                </button>
                <button class="btn btn-secondary btn-sm" onclick="exportLogs()">
                    <i class="fas fa-download"></i> Export
                </button>
                <button class="btn btn-secondary btn-sm" id="live-btn" onclick="toggleLive()">
                    <i class="fas fa-circle" style="color:var(--red);font-size:9px"></i> Live
                </button>
            </div>
        </div>

        <div class="page-body">
            <!-- Filters -->
            <div class="card mb-3">
                <div class="card-body" style="padding:14px 20px">
                    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
                        <div style="flex:1;min-width:140px">
                            <label class="form-label">Level</label>
                            <select id="log-level-filter" class="form-select">
                                <option value="">All Levels</option>
                                <option value="DEBUG">Debug</option>
                                <option value="INFO">Info</option>
                                <option value="WARNING">Warning</option>
                                <option value="ERROR">Error</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>
                        <div style="flex:1;min-width:80px">
                            <label class="form-label">Limit</label>
                            <select id="log-limit" class="form-select">
                                <option value="50">50</option>
                                <option value="100" selected>100</option>
                                <option value="250">250</option>
                                <option value="500">500</option>
                            </select>
                        </div>
                        <div style="flex:2;min-width:180px">
                            <label class="form-label">Search</label>
                            <input type="text" id="search-filter" class="form-control" placeholder="Filter log messages…">
                        </div>
                        <div style="display:flex;gap:6px">
                            <button class="btn btn-primary btn-sm" onclick="loadLogs()">
                                <i class="fas fa-search"></i> Apply
                            </button>
                            <button class="btn btn-secondary btn-sm" onclick="clearFilters()">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Log Viewer -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fas fa-terminal"></i> Event Stream</div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <span id="log-count" class="badge badge-gray">0 entries</span>
                        <span id="live-indicator" style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">● disconnected</span>
                    </div>
                </div>
                <div id="log-viewer" class="log-viewer">
                    <div class="empty-state">
                        <div class="spinner spinner-lg" style="margin:0 auto 12px"></div>
                        <p>Loading logs…</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/app.js') }}"></script>
<script>
let currentLogs = [];
let logSocket = null;
let liveEnabled = true;

document.addEventListener('DOMContentLoaded', () => {
    loadLogs();
    connectWebSocket();
    document.getElementById('search-filter').addEventListener('input', debounce(filterDisplayed, 250));
});

function connectWebSocket() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    logSocket = new WebSocket(`${proto}//${location.host}/ws/logs`);
    const indicator = document.getElementById('live-indicator');

    logSocket.onopen = () => {
        indicator.textContent = '● live';
        indicator.style.color = 'var(--green)';
    };

    logSocket.onmessage = (e) => {
        if (!liveEnabled) return;
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'heartbeat') return;
            const entry = {
                timestamp: data.asctime || new Date().toISOString(),
                level: data.levelname || 'INFO',
                message: data.message || e.data,
                module: data.name || ''
            };

            // Check if the entry matches the active level filter
            const selectedLevel = document.getElementById('log-level-filter').value;
            if (selectedLevel && entry.level.toUpperCase() !== selectedLevel.toUpperCase()) {
                return;
            }

            currentLogs.unshift(entry);
            if (currentLogs.length > 1000) currentLogs = currentLogs.slice(0, 1000);
            displayLogs(currentLogs);
            updateCount(currentLogs.length);
        } catch { /* plain text */ }
    };

    logSocket.onclose = () => {
        indicator.textContent = '● disconnected';
        indicator.style.color = 'var(--red)';
        setTimeout(connectWebSocket, 5000);
    };

    logSocket.onerror = () => {
        indicator.textContent = '● error';
        indicator.style.color = 'var(--yellow)';
    };
}

function toggleLive() {
    liveEnabled = !liveEnabled;
    const btn = document.getElementById('live-btn');
    const dot = btn.querySelector('i');
    dot.style.color = liveEnabled ? 'var(--red)' : 'var(--text-muted)';
    showToast(liveEnabled ? 'Live stream enabled' : 'Live stream paused', 'info');
}

async function loadLogs() {
    const level = document.getElementById('log-level-filter').value;
    const limit = document.getElementById('log-limit').value;
    let url = `/api/logs?limit=${limit}`;
    if (level) url += `&level=${level}`;

    const viewer = document.getElementById('log-viewer');
    viewer.innerHTML = '<div class="empty-state"><div class="spinner spinner-lg" style="margin:0 auto 12px"></div><p>Loading…</p></div>';

    try {
        const r = await fetch(url);
        const logs = await r.json();
        currentLogs = logs;
        displayLogs(logs);
        updateCount(logs.length);
    } catch (e) {
        viewer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle text-red"></i><h3>Failed to load logs</h3></div>';
    }
}

function displayLogs(logs) {
    const viewer = document.getElementById('log-viewer');
    const search = document.getElementById('search-filter').value.toLowerCase();
    const filtered = search ? logs.filter(l =>
        l.message.toLowerCase().includes(search) ||
        l.level.toLowerCase().includes(search) ||
        (l.module || '').toLowerCase().includes(search)
    ) : logs;

    if (!filtered.length) {
        viewer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><h3>No entries match</h3></div>';
        return;
    }

    viewer.innerHTML = filtered.map(log => {
        const ts = new Date(log.timestamp).toLocaleTimeString('en-US', { hour12: false });
        const mod = log.module ? `<span class="log-mod">[${log.module.split('.').pop()}]</span>` : '';
        let msg = escapeHtml(log.message);
        if (search) {
            const rx = new RegExp(escapeRegex(search), 'gi');
            msg = msg.replace(rx, m => `<mark style="background:rgba(0,200,255,0.2);color:var(--accent);border-radius:2px">${m}</mark>`);
        }
        return `<div class="log-entry ${log.level}">
            <span class="log-ts">${ts}</span>
            <span class="log-level ${log.level}">${log.level}</span>
            ${mod}
            <span class="log-msg">${msg}</span>
        </div>`;
    }).join('');
}

function filterDisplayed() { displayLogs(currentLogs); }

function clearFilters() {
    document.getElementById('log-level-filter').value = '';
    document.getElementById('search-filter').value = '';
    loadLogs();
}

function updateCount(n) {
    const el = document.getElementById('log-count');
    el.textContent = `${n} entries`;
    el.className = n > 0 ? 'badge badge-blue' : 'badge badge-gray';
}

function exportLogs() {
    if (!currentLogs.length) { showToast('No logs to export', 'warning'); return; }
    const text = currentLogs.map(l => `${l.timestamp} [${l.level}] ${l.module || ''} ${l.message}`).join('\n');
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([text], {type:'text/plain'})),
        download: `familybot-${new Date().toISOString().split('T')[0]}.log`
    });
    a.click();
    showToast('Logs exported', 'success');
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
</script>
</body>
</html>
